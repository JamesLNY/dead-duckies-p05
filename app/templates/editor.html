{% extends "index.html" %}
{% block title %}Stardew Valley{% endblock %}

{% block content %}

<div>
  <label for="property-select">Editing Property:</label>
  <select id="property-select">
    <option value="passable">Passable</option>
    <option value="tillable">Tillable</option>
    <option value="teleporter">Teleporter</option>
    <option value="setwarp">Set Warp Destination</option>
  </select>
</div>

<div>
  <label for="map-select">Map:</label>
  <select id="map-select">
    <option value="farm">Farm</option>
    <option value="town">Town</option>
    <option value="seedshop">Pierre's</option>
    <option value="beach">Beach</option>
    <option value="fishshop">Willy's</option>
  </select>
</div>

<div id="game-holder">
  <div id="canvas-wrapper">
      <canvas id="main-canvas"></canvas>
  </div>
</div>
<script type="module" src="/static/js/editor.js"></script>
{% endblock %}
